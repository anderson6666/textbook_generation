<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>教科书编辑器 - Agnes AI</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
    />
    <script type="module" crossorigin src="./assets/index-BnSAPxCO.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BEnJbdFz.css">
    
    <style>
      .notification-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 99999;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 12px 20px;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        transform: translateY(0);
        transition: all 0.3s ease;
        font-family: 'Noto Sans SC', sans-serif;
      }
      
      .notification-bar.minimized {
        transform: translateY(-100%);
      }
      
      .notification-bar.minimized .notification-toggle {
        transform: translateY(100%);
        opacity: 1;
      }
      
      .notification-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: 1400px;
        margin: 0 auto;
        gap: 15px;
      }
      
      .notification-message {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
      }
      
      .notification-icon {
        font-size: 20px;
        animation: pulse 2s infinite;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.1); }
      }
      
      .notification-text {
        font-size: 14px;
        font-weight: 500;
      }
      
      .notification-text strong {
        font-weight: 700;
      }
      
      .notification-status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 12px;
        background: rgba(255,255,255,0.2);
        border-radius: 20px;
        font-size: 12px;
        margin-left: 10px;
      }
      
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #4ade80;
        animation: blink 1.5s infinite;
      }
      
      .status-dot.warning {
        background: #fbbf24;
      }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      
      .notification-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      
      .notification-btn {
        background: rgba(255,255,255,0.2);
        border: none;
        color: white;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: all 0.2s;
        font-family: inherit;
      }
      
      .notification-btn:hover {
        background: rgba(255,255,255,0.3);
        transform: translateY(-1px);
      }
      
      .notification-btn.primary {
        background: white;
        color: #667eea;
      }
      
      .notification-btn.primary:hover {
        background: #f0f0f0;
      }
      
      .notification-toggle {
        position: fixed;
        top: 0;
        right: 20px;
        z-index: 99998;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 0 0 8px 8px;
        cursor: pointer;
        font-size: 12px;
        box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
        opacity: 0;
        transition: all 0.3s ease;
        font-family: inherit;
      }
      
      .notification-toggle:hover {
        padding: 10px 16px;
      }
      
      #root {
        padding-top: 56px;
        min-height: 100vh;
        transition: padding-top 0.3s ease;
      }
      
      .notification-bar.minimized ~ #root {
        padding-top: 0;
      }
    </style>
  </head>
  <body>
    <div class="notification-bar" id="notificationBar">
      <div class="notification-content">
        <div class="notification-message">
          <span class="notification-icon">📢</span>
          <div class="notification-text">
            <strong>欢迎使用 Agnes AI 教科书编辑器！</strong>
            <span id="notificationStatus" class="notification-status">
              <span class="status-dot warning" id="statusDot"></span>
              <span id="statusText">API Key 待配置</span>
            </span>
          </div>
        </div>
        <div class="notification-actions">
          <button class="notification-btn primary" onclick="openSettings()">⚙️ 设置 API Key</button>
          <button class="notification-btn" onclick="showHelp()">❓ 使用帮助</button>
          <button class="notification-btn" onclick="minimizeNotification()">➖ 最小化</button>
        </div>
      </div>
    </div>
    
    <button class="notification-toggle" id="notificationToggle" onclick="restoreNotification()">
      📢 显示通知栏
    </button>
    
    <div id="root"></div>
    
    <script>
      let notificationBar = document.getElementById('notificationBar');
      let notificationToggle = document.getElementById('notificationToggle');
      let statusDot = document.getElementById('statusDot');
      let statusText = document.getElementById('statusText');
      
      function minimizeNotification() {
        notificationBar.classList.add('minimized');
        localStorage.setItem('notificationMinimized', 'true');
      }
      
      function restoreNotification() {
        notificationBar.classList.remove('minimized');
        localStorage.setItem('notificationMinimized', 'false');
      }
      
      function openSettings() {
        const event = new CustomEvent('openSettings');
        window.dispatchEvent(event);
        alert('请在应用内点击"去设置"按钮配置您的 API Key');
      }
      
      function showHelp() {
        alert(`📚 Agnes AI 教科书编辑器 使用帮助：

1️⃣ 首先在设置页面配置您的 API Key
2️⃣ API Key 验证成功后即可开始使用
3️⃣ 支持自动生成各学科教科书内容
4️⃣ 可实时编辑和预览生成的内容

💡 提示：通知栏会始终驻留在页面顶部，方便您随时查看状态！`);
      }
      
      function updateAPIStatus(valid) {
        if (valid) {
          statusDot.className = 'status-dot';
          statusText.textContent = 'API Key 已验证';
        } else {
          statusDot.className = 'status-dot warning';
          statusText.textContent = 'API Key 待配置';
        }
      }
      
      if (localStorage.getItem('notificationMinimized') === 'true') {
        notificationBar.classList.add('minimized');
      }
      
      window.addEventListener('apiKeyValid', () => updateAPIStatus(true));
      window.addEventListener('apiKeyInvalid', () => updateAPIStatus(false));
      
      setInterval(() => {
        const apiKey = localStorage.getItem('apiKey') || localStorage.getItem('agnes_api_key');
        if (apiKey && apiKey.length > 10) {
          updateAPIStatus(true);
        }
      }, 1000);
    </script>
  </body>
</html>
